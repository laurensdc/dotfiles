theme = "amberwood"

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[keys.normal]
"C-c" = "normal_mode"
"K" = "hover"
"_" = "goto_line_start"
"C-h" = "jump_view_left"
"C-j" = "jump_view_down"
"C-k" = "jump_view_up"
"C-l" = "jump_view_right"

[keys.select]
"C-c" = "normal_mode"

[keys.insert]
"C-c" = "normal_mode"

[editor]
default-yank-register = "+"


